name: "Release: Frontend"

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: BloomFront
        run: |
          npm install
          npm run build

      - name: Upload frontend via FTP
        working-directory: BloomFront/dist
        run: |
          find . -type f -not -name '.*' -not -path './api/*' | while read file; do
            remote_path="${file#./}"
            echo "Uploading $remote_path..."
            curl -T "$file" \
              --ftp-create-dirs \
              "ftp://${{ secrets.FTP_SERVER }}/$remote_path" \
              --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          done
